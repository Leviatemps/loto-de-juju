<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Loto de Juju 🍀</title>
  <style>
    /* ===== Reset & variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #f5c518;
      --gold2:  #e6a800;
      --purple: #6c3fc5;
      --purple2:#4b2a9a;
      --comp:   #e8344e;
      --comp2:  #b5182f;
      --bg:     #0f0c29;
      --card:   rgba(255,255,255,0.06);
      --radius: 18px;
    }

    /* ===== Background ===== */
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 55%, #24243e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    /* Étoiles décoratives */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255,255,255,0.15) 1px, transparent 1px),
        radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 60px 60px, 120px 120px;
      background-position: 0 0, 30px 30px;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== Header ===== */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header .logo-svg { display: block; margin: 0 auto .6rem; width: 120px; height: 100px; }

    /* Poignée : mouvement vers l'avant (perspective 3D) */
    @keyframes leverPull {
      0%   { transform: perspective(200px) rotateX(0deg); }
      20%  { transform: perspective(200px) rotateX(-5deg); }   /* légère tension */
      45%  { transform: perspective(200px) rotateX(55deg); }   /* tirage vers l'avant */
      60%  { transform: perspective(200px) rotateX(55deg); }   /* maintien */
      75%  { transform: perspective(200px) rotateX(-8deg); }   /* retour avec dépassement */
      86%  { transform: perspective(200px) rotateX(4deg); }    /* rebond */
      94%  { transform: perspective(200px) rotateX(-1deg); }
      100% { transform: perspective(200px) rotateX(0deg); }    /* repos */
    }

    .logo-levier {
      transform-origin: 101px 68px;
      animation: leverPull 2.2s 0.5s ease-in-out infinite;
    }
    .logo-piece-2   { animation: piece 0.7s 1.2s ease-in both; }
    .logo-piece-3   { animation: piece 0.7s 1.4s ease-in both; }

    header h1 {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(90deg, var(--gold), #fff 50%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
    }

    header p {
      color: rgba(255,255,255,0.55);
      font-size: .95rem;
      margin-top: .5rem;
    }

    /* ===== Cards ===== */
    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 640px;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 1.5rem;
      opacity: .7;
    }

    .card.complementaire h2 { color: var(--comp); opacity: 1; }
    .card.principaux h2     { color: var(--gold);  opacity: 1; }

    /* ===== Zone de billes ===== */
    .balls-zone {
      min-height: 84px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    /* Placeholder quand pas encore tiré */
    .placeholder {
      display: flex;
      gap: 14px;
    }

    .placeholder span {
      width: 68px; height: 68px;
      border-radius: 50%;
      border: 2px dashed rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 1.4rem;
    }

    /* ===== Bille ===== */
    .ball {
      width: 68px; height: 68px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.45rem;
      font-weight: 900;
      cursor: default;
      user-select: none;
      /* animation d'apparition */
      opacity: 0;
      transform: scale(0.3) rotate(-20deg);
      animation: popIn .45s cubic-bezier(.175,.885,.32,1.275) forwards;
      position: relative;
      box-shadow: 0 4px 18px rgba(0,0,0,0.4);
    }

    /* Reflet sur la bille */
    .ball::after {
      content: '';
      position: absolute;
      top: 10px; left: 14px;
      width: 28px; height: 16px;
      background: rgba(255,255,255,0.25);
      border-radius: 50%;
      transform: rotate(-30deg);
    }

    .ball.principal {
      background: linear-gradient(145deg, #ffe76e, var(--gold2));
      color: #3a2800;
    }

    .ball.complementaire {
      background: linear-gradient(145deg, #ff7b90, var(--comp2));
      color: #fff;
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Délai en cascade pour chaque bille */
    .ball:nth-child(1) { animation-delay: .05s; }
    .ball:nth-child(2) { animation-delay: .15s; }
    .ball:nth-child(3) { animation-delay: .25s; }
    .ball:nth-child(4) { animation-delay: .35s; }
    .ball:nth-child(5) { animation-delay: .45s; }

    /* ===== Boutons ===== */
    button {
      width: 100%;
      padding: .9rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      letter-spacing: .5px;
    }

    button:active { transform: scale(.97); }

    button.btn-principal {
      background: linear-gradient(135deg, #ffe76e, var(--gold2));
      color: #3a2800;
      box-shadow: 0 4px 20px rgba(245,197,24,0.5);
    }
    button.btn-principal:hover { box-shadow: 0 6px 28px rgba(245,197,24,0.7); transform: translateY(-1px); }

    button.btn-complementaire {
      background: linear-gradient(135deg, #ff7b90, var(--comp2));
      color: #fff;
      box-shadow: 0 4px 20px rgba(232,52,78,0.5);
    }
    button.btn-complementaire:hover { box-shadow: 0 6px 28px rgba(232,52,78,0.7); transform: translateY(-1px); }

    /* ===== Historique ===== */
    .history-section {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    .history-section h3 {
      font-size: .85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      opacity: .45;
      margin-bottom: .8rem;
      text-align: center;
    }

    #history-list { list-style: none; }

    #history-list li {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: .65rem 1rem;
      margin-bottom: .5rem;
      font-size: .88rem;
      color: rgba(255,255,255,0.65);
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
      animation: slideIn .3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #history-list li .mini-balls { display: flex; gap: 6px; flex-wrap: wrap; }

    .mini-ball {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      border-radius: 50%;
      font-size: .78rem;
      font-weight: 800;
    }
    .mini-ball.principal       { background: var(--gold);  color: #3a2800; }
    .mini-ball.complementaire  { background: var(--comp);  color: #fff; }

    .history-label {
      font-size: .72rem;
      opacity: .4;
      margin-right: 4px;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .card { padding: 1.5rem 1.2rem; }
      .ball { width: 58px; height: 58px; font-size: 1.2rem; }
    }
  </style>
</head>
<body>

  <!-- ===== En-tête ===== -->
  <header>
    <!-- Machine à sous -->
    <svg class="logo-svg" viewBox="0 0 120 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#6c3fc5"/>
        </linearGradient>
        <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#1a1a2e"/>
          <stop offset="100%" stop-color="#0f0c29"/>
        </linearGradient>
        <linearGradient id="leverGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#e63946"/>
          <stop offset="100%" stop-color="#ff6b6b"/>
        </linearGradient>
      </defs>

      <!-- Corps principal -->
      <rect x="8" y="18" width="88" height="72" rx="10" fill="url(#bodyGrad)" stroke="#e6a800" stroke-width="2"/>
      <!-- Reflet haut -->
      <rect x="8" y="18" width="88" height="20" rx="10" fill="white" opacity="0.08"/>

      <!-- Bandeau doré du haut -->
      <rect x="8" y="18" width="88" height="12" rx="8" fill="#f5c518" opacity="0.9"/>
      <text x="52" y="28" font-size="7.5" fill="#4b2a9a" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">JACKPOT</text>

      <!-- Écran des rouleaux -->
      <rect x="18" y="36" width="68" height="34" rx="5" fill="url(#screenGrad)" stroke="#f5c518" stroke-width="1.5"/>

      <!-- Rouleau 1 — 7 -->
      <g class="logo-rouleau-1">
        <rect x="22" y="39" width="18" height="28" rx="3" fill="#1e1e3f"/>
        <text x="31" y="58" font-size="18" text-anchor="middle" font-family="Arial, sans-serif">7</text>
      </g>

      <!-- Rouleau 2 — 🍒 -->
      <g class="logo-rouleau-2">
        <rect x="45" y="39" width="18" height="28" rx="3" fill="#1e1e3f"/>
        <text x="54" y="58" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">🍒</text>
      </g>

      <!-- Rouleau 3 — ⭐ -->
      <g class="logo-rouleau-3">
        <rect x="68" y="39" width="18" height="28" rx="3" fill="#1e1e3f"/>
        <text x="77" y="58" font-size="16" text-anchor="middle" font-family="Arial, sans-serif">⭐</text>
      </g>

      <!-- Ligne gagnante -->
      <line x1="18" y1="53" x2="86" y2="53" stroke="#f5c518" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

      <!-- Bouton SPIN -->
      <rect x="34" y="76" width="36" height="10" rx="5" fill="#e8344e" stroke="#b5182f" stroke-width="1"/>
      <text x="52" y="84" font-size="6" fill="white" font-family="Arial Black, sans-serif" font-weight="900" text-anchor="middle" letter-spacing="1">SPIN</text>

      <!-- Levier -->
      <g class="logo-levier">
        <rect x="98" y="30" width="6" height="38" rx="3" fill="url(#leverGrad)" stroke="#b5182f" stroke-width="1"/>
        <circle cx="101" cy="28" r="6" fill="#e8344e" stroke="#b5182f" stroke-width="1.5"/>
        <circle cx="101" cy="28" r="3" fill="#ff9999" opacity="0.6"/>
      </g>

      <!-- Pied de la machine -->
      <rect x="20" y="87" width="22" height="7" rx="3" fill="#4b2a9a"/>
      <rect x="62" y="87" width="22" height="7" rx="3" fill="#4b2a9a"/>

      <!-- Lumières décoratives -->
      <circle class="logo-lumiere-1" cx="14" cy="24" r="2.5" fill="#ffd700"/>
      <circle class="logo-lumiere-2" cx="90" cy="24" r="2.5" fill="#ffd700"/>
      <circle class="logo-lumiere-3" cx="14" cy="82" r="2" fill="#e8344e"/>
      <circle class="logo-lumiere-4" cx="90" cy="82" r="2" fill="#e8344e"/>

      <!-- Pièces qui tombent -->
      <g class="logo-piece-1">
        <circle cx="6" cy="72" r="4" fill="#f5c518" stroke="#b8860b" stroke-width="1"/>
        <text x="6" y="75" font-size="4.5" fill="#4b2a9a" text-anchor="middle" font-weight="bold">$</text>
      </g>
      <circle class="logo-piece-2" cx="3" cy="85" r="3.5" fill="#f5c518" stroke="#b8860b" stroke-width="1"/>
      <circle class="logo-piece-3" cx="8" cy="95" r="3" fill="#f5c518" stroke="#b8860b" stroke-width="1"/>
    </svg>
    <h1>Le Loto de Juju</h1>
  </header>

  <!-- ===== Numéros principaux ===== -->
  <div class="card principaux">
    <h2>🟡 Numéros principaux (1 – 49)</h2>

    <div class="balls-zone" id="main-balls">
      <!-- Placeholder visuel avant le premier tirage -->
      <div class="placeholder" id="main-placeholder">
        <span>?</span><span>?</span><span>?</span><span>?</span><span>?</span>
      </div>
    </div>

    <button class="btn-principal" onclick="tirerPrincipaux()">
      🎱 Générer les 5 numéros principaux
    </button>
  </div>

  <!-- ===== Numéro complémentaire ===== -->
  <div class="card complementaire">
    <h2>🔴 Numéros complémentaires (1 – 10)</h2>

    <div class="balls-zone" id="comp-balls">
      <div class="placeholder" id="comp-placeholder">
        <span>?</span><span>?</span>
      </div>
    </div>

    <button class="btn-complementaire" onclick="tirerComplementaire()">
      🎲 Générer les 2 numéros complémentaires
    </button>
  </div>

  <!-- ===== Historique des tirages ===== -->
  <div class="history-section" id="history-section" style="display:none;">
    <h3>📋 Historique des tirages</h3>
    <ul id="history-list"></ul>
  </div>

  <script>
    /* ============================================================
       Utilitaires
    ============================================================ */

    /**
     * Génère `count` entiers distincts dans [min, max] (inclus).
     * @param {number} min
     * @param {number} max
     * @param {number} count
     * @returns {number[]} tableau trié
     */
    function genererUniques(min, max, count) {
      const pool = new Set();
      while (pool.size < count) {
        pool.add(Math.floor(Math.random() * (max - min + 1)) + min);
      }
      return [...pool].sort((a, b) => a - b);
    }

    /**
     * Crée un élément <li> de synthèse pour l'historique.
     * @param {number[]} principaux
     * @param {number|null} complementaire
     */
    function ajouterHistorique(principaux, complementaire) {
      const liste = document.getElementById('history-list');
      const section = document.getElementById('history-section');

      const li = document.createElement('li');

      // Numéros principaux
      const labelP = document.createElement('span');
      labelP.className = 'history-label';
      labelP.textContent = 'Principaux :';
      li.appendChild(labelP);

      const ballsP = document.createElement('span');
      ballsP.className = 'mini-balls';
      principaux.forEach(n => {
        const b = document.createElement('span');
        b.className = 'mini-ball principal';
        b.textContent = n;
        ballsP.appendChild(b);
      });
      li.appendChild(ballsP);

      // Numéros complémentaires (si présents)
      if (complementaire !== null && complementaire.length) {
        const sep = document.createElement('span');
        sep.className = 'history-label';
        sep.textContent = ' | Comp. :';
        li.appendChild(sep);

        const ballsC = document.createElement('span');
        ballsC.className = 'mini-balls';
        complementaire.forEach(n => {
          const bc = document.createElement('span');
          bc.className = 'mini-ball complementaire';
          bc.textContent = n;
          ballsC.appendChild(bc);
        });
        li.appendChild(ballsC);
      }

      // Horodatage
      const time = document.createElement('span');
      time.className = 'history-label';
      time.style.marginLeft = 'auto';
      time.textContent = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      li.appendChild(time);

      liste.prepend(li);           // plus récent en tête
      section.style.display = '';  // afficher la section
    }

    /* ============================================================
       État de la session
    ============================================================ */
    let derniersPrincipaux = [];    // mémorisé pour l'historique combiné

    /* ============================================================
       Tirage des numéros principaux
    ============================================================ */
    function tirerPrincipaux() {
      const numeros = genererUniques(1, 49, 5);
      derniersPrincipaux = numeros;

      const zone = document.getElementById('main-balls');

      // Retirer le placeholder et les anciennes billes
      zone.innerHTML = '';

      // Créer les nouvelles billes avec animation en cascade
      numeros.forEach((n, i) => {
        const bille = document.createElement('div');
        bille.className = 'ball principal';
        bille.style.animationDelay = `${i * 0.1}s`;
        bille.textContent = n;
        zone.appendChild(bille);
      });

      // Ajouter à l'historique (sans complémentaire pour l'instant)
      ajouterHistorique(numeros, null);
    }

    /* ============================================================
       Tirage du numéro complémentaire
    ============================================================ */
    function tirerComplementaire() {
      // 2 numéros complémentaires distincts entre 1 et 10
      const numeros = genererUniques(1, 10, 2);

      const zone = document.getElementById('comp-balls');
      zone.innerHTML = '';

      numeros.forEach((n, i) => {
        const bille = document.createElement('div');
        bille.className = 'ball complementaire';
        bille.style.animationDelay = `${i * 0.15}s`;
        bille.textContent = n;
        zone.appendChild(bille);
      });

      // Ajouter à l'historique avec contexte
      if (derniersPrincipaux.length) {
        ajouterHistorique(derniersPrincipaux, numeros);
      } else {
        ajouterHistorique([], numeros);
      }
    }
  </script>

</body>
</html>
